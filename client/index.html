<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    
    <!-- Primary Meta Tags -->
    <title>MotorVault - Premium Motor Products from Verified Sellers | Shop Smart, Save More</title>
    <meta name="title" content="MotorVault - Premium Motor Products from Verified Sellers | Shop Smart, Save More" />
    <meta name="description" content="Discover thousands of premium motor products from verified sellers. Quality guaranteed, fast shipping, and secure checkout on every purchase. Shop automotive parts, accessories, and more." />
    <meta name="keywords" content="online marketplace, e-commerce, shopping, motor products, automotive, parts, accessories, verified sellers, fast shipping, secure checkout" />
    <meta name="author" content="MotorVault" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="language" content="English" />
    <meta name="revisit-after" content="7 days" />
    
    <!-- Canonical URL -->
    <link rel="canonical" href="https://modernmart.manus.space/" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://modernmart.manus.space/" />
    <meta property="og:title" content="MotorVault - Premium Motor Products from Verified Sellers" />
    <meta property="og:description" content="Discover thousands of premium motor products from verified sellers. Quality guaranteed, fast shipping, and secure checkout." />
    <meta property="og:image" content="https://modernmart.manus.space/og-image.png" />
    <meta property="og:site_name" content="MotorVault" />
    <meta property="og:locale" content="en_US" />
    
    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://modernmart.manus.space/" />
    <meta property="twitter:title" content="MotorVault - Premium Motor Products from Verified Sellers" />
    <meta property="twitter:description" content="Discover thousands of premium motor products from verified sellers. Quality guaranteed, fast shipping, and secure checkout." />
    <meta property="twitter:image" content="https://modernmart.manus.space/og-image.png" />
    
    <!-- Additional Meta Tags -->
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MotorVault" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/motorvault_icon.svg" />
    <link rel="apple-touch-icon" href="/motorvault_icon.svg" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <!-- JSON-LD Structured Data for Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "MotorVault",
      "url": "https://modernmart.manus.space",
      "logo": "https://modernmart.manus.space/logo.png",
      "description": "Premium e-commerce marketplace with verified sellers and quality products",
      "sameAs": [
        "https://www.facebook.com/modernmart",
        "https://www.twitter.com/modernmart",
        "https://www.instagram.com/modernmart"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "email": "support@modernmart.manus.space",
        "availableLanguage": "en"
      }
    }
    </script>
    
    <!-- JSON-LD Structured Data for WebSite -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "ModernMart",
      "url": "https://modernmart.manus.space",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://modernmart.manus.space/products?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <!-- JSON-LD Structured Data for LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "ModernMart",
      "description": "Premium e-commerce marketplace with verified sellers",
      "url": "https://modernmart.manus.space",
      "image": "https://modernmart.manus.space/logo.png",
      "priceRange": "$0-$10000",
      "areaServed": "US",
      "availableLanguage": "en"
    }
    </script>
    
    <!-- Sitemap and Robots -->
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Preload Critical Resources -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" as="style" />
    
    <!-- Analytics (optional - disabled by default) -->
    <!-- To enable analytics, configure VITE_ANALYTICS_ENDPOINT and VITE_ANALYTICS_WEBSITE_ID in .env.local -->
    <!-- <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script> -->
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>

</html>
