<svg width="800" height="160" viewBox="0 0 800 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .logo-text { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; }
      .logo-main { font-size: 56px; font-weight: 700; letter-spacing: -0.5px; }
      .logo-sub { font-size: 56px; font-weight: 300; letter-spacing: -0.5px; }
    </style>
    <linearGradient id="vaultGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1724;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icon: Modern Padlock/Vault -->
  <g transform="translate(30, 25)">
    <!-- Outer circle ring -->
    <circle cx="60" cy="60" r="58" fill="none" stroke="#0f1724" stroke-width="2.5"/>
    
    <!-- Padlock body -->
    <g>
      <!-- Shackle (top arch) -->
      <path d="M 38 50 Q 38 28 60 28 Q 82 28 82 50" fill="none" stroke="#0f1724" stroke-width="4" stroke-linecap="round"/>
      
      <!-- Lock body -->
      <rect x="40" y="50" width="40" height="45" rx="3" fill="#0f1724"/>
      
      <!-- Lock face - subtle gradient -->
      <rect x="42" y="52" width="36" height="41" rx="2" fill="#f5f5f5"/>
      
      <!-- Keyhole circle -->
      <circle cx="60" cy="70" r="5" fill="#0f1724"/>
      
      <!-- Keyhole stem -->
      <rect x="58" y="75" width="4" height="12" fill="#0f1724" rx="1"/>
    </g>
    
    <!-- Accent dot (security indicator) -->
    <circle cx="60" cy="95" r="2.5" fill="#dc2626"/>
  </g>
  
  <!-- Text: MOTORVAULT -->
  <text x="125" y="110" class="logo-text logo-main" fill="#0f1724">MOTOR</text>
  <text x="525" y="110" class="logo-text logo-sub" fill="#0f1724">VAULT</text>
  
  <!-- Tagline (optional but professional) -->
  <text x="125" y="132" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="500" letter-spacing="0.5px" fill="#6b7280" text-transform="uppercase">SECURE MARKETPLACE</text>
</svg>